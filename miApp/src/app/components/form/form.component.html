<form [formGroup]="usuarioForm" (ngSubmit)="agregarUsuario()">
    <input formControlName="nombre" placeholder="Nombre del usuario">
    <input formControlName="avatar" placeholder="URL del Avatar (Imagen)">

    <select formControlName="estado">
        <option value="online">Online</option>
        <option value="offline">Offline</option>
        <option value="última vez visto">Última vez visto</option>
    </select>

    <button type="submit" [disabled]="usuarioForm.invalid">Crear Usuario</button>
</form>

<hr>

<div class="usuarios-grid">
    @for (user of usuarios(); track user.id) {
    <div class="card">
        <img [src]="user.avatar" alt="Avatar" width="50">
        <h3>{{ user.nombre }} ({{ user.estado }})</h3>

        <div class="chat-box">
            @for (msg of user.mensajes; track msg.fecha) {
            <p><strong>{{ msg.fecha | date:'shortTime' }}:</strong> {{ msg.texto }}</p>
            } @empty {
            <p>No hay mensajes aún.</p>
            }
        </div>

        <input #msgInput type="text" placeholder="Escribir mensaje...">
        <button (click)="enviarMensaje(user.id, msgInput.value); msgInput.value=''">Enviar</button>
    </div>
    }
</div>
